# Render Blueprint - Alert-only Background Worker + Persistent Disk

services:
  - type: worker
    name: memecoin-alert-bot
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true

    envVars:
      - key: TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: WALLET_PRIVATE_KEY
        sync: false

      - key: DATA_DIR
        value: /data
      - key: AUTO_BUY_ENABLED
        value: "false"
      - key: WATCH_AFTER_ALERT
        value: "true"

      - key: MIN_LIQ_USD
        value: "8000"
      - key: MIN_TXNS_H1
        value: "35"
      - key: MIN_BUY_RATIO
        value: "0.52"
      - key: MAX_BUY_RATIO
        value: "0.92"
      - key: MIN_VOLUME_LIQ_H1
        value: "0.30"
      - key: MAX_PRICE_H1
        value: "300"

    disk:
      name: watchlist-disk
      mountPath: /data
      sizeGB: 1
